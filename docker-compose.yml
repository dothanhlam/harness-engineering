services:
  # ── Ollama LLM Server (sidecar) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: harness-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  # ── Harness Pipeline ────────────────────────────────────────────────────
  harness:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harness-pipeline
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODELS=hermes3:8b,gemma4:e4b
    volumes:
      - ./workspace:/app/workspace
      - ./memory:/app/memory
      - ./harness_config.json:/app/harness_config.json:ro
    stdin_open: true
    tty: true

volumes:
  ollama_models:
    name: harness-ollama-models
